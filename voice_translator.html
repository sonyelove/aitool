<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 음성 번역기 (로컬 & 온라인 무상 지원)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 아이콘 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between p-4 sm:p-6 md:p-8">

    <!-- 상단 헤더 -->
    <header class="max-w-4xl w-full mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
        <div class="flex items-center gap-3">
            <div class="p-3 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/30 animate-pulse">
                <i class="fa-solid fa-microphone-lines text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">VoiceLink</h1>
                <p class="text-xs text-slate-400">네이티브 Web API 기반 실시간 번역기</p>
            </div>
        </div>
        
        <!-- 번역 엔진 선택 스위치 -->
        <div class="flex items-center bg-slate-800/80 p-1.5 rounded-xl border border-slate-700">
            <button id="engine-local" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all duration-300 text-slate-400 hover:text-slate-200" onclick="setEngine('local')">
                <i class="fa-solid fa-database mr-1.5"></i>로컬 사전 모드
            </button>
            <button id="engine-ai" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all duration-300 bg-indigo-600 text-white shadow-md" onclick="setEngine('ai')">
                <i class="fa-solid fa-earth-asia mr-1.5"></i>온라인 실시간 번역
            </button>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="max-w-4xl w-full mx-auto flex-grow flex flex-col justify-center gap-6">
        
        <!-- 번역 카드 컨테이너 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- 왼쪽: 소스 언어 카드 -->
            <div class="glass-card rounded-3xl p-6 flex flex-col justify-between min-h-[320px] transition-all duration-300 hover:border-slate-500/30 relative">
                <div>
                    <!-- 언어 선택 헤더 -->
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold tracking-wider text-indigo-400 uppercase">출발어 (Source)</span>
                        <select id="source-lang" class="bg-slate-800/90 text-sm font-medium border border-slate-700 rounded-xl px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200" onchange="handleLanguageChange()">
                            <option value="ko-KR">한국어 (Korean)</option>
                            <option value="en-US">영어 (English)</option>
                            <option value="ja-JP">일본어 (Japanese)</option>
                        </select>
                    </div>
                    
                    <!-- 텍스트 영역 -->
                    <textarea id="source-text" placeholder="마이크 버튼을 누르고 말씀하시거나, 직접 텍스트를 입력해 보세요..." 
                        class="w-full h-40 bg-transparent text-lg text-slate-100 placeholder-slate-500 border-none resize-none focus:outline-none focus:ring-0"></textarea>
                </div>

                <!-- 제어 및 액션 버튼 -->
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-800">
                    <div class="flex gap-2">
                        <button onclick="clearText()" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-100 transition-colors" title="지우기">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                        <button onclick="copyToClipboard('source-text')" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-100 transition-colors" title="텍스트 복사">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                    
                    <!-- 마이크 작동 버튼 -->
                    <button id="mic-btn" onclick="toggleSpeechRecognition()" class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold transition-all duration-300 shadow-lg shadow-indigo-600/20 active:scale-95">
                        <i id="mic-icon" class="fa-solid fa-microphone text-lg"></i>
                        <span id="mic-text">음성 인식 시작</span>
                    </button>
                </div>

                <!-- 음성 인식 중 흐르는 물결 이펙트 -->
                <div id="listening-wave" class="absolute inset-0 bg-indigo-600/15 rounded-3xl flex flex-col justify-center items-center gap-4 hidden z-10 backdrop-blur-md">
                    <div class="flex gap-1.5 items-center justify-center">
                        <span class="w-2 h-8 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                        <span class="w-2 h-12 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                        <span class="w-2 h-6 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
                        <span class="w-2 h-10 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                        <span class="w-2 h-4 bg-cyan-500 rounded-full animate-bounce" style="animation-delay: 0.5s"></span>
                    </div>
                    <p class="text-sm font-semibold text-indigo-300">마이크 상시 수신 중... 말씀해 주세요</p>
                    <button onclick="stopSpeechRecognition()" class="px-5 py-2 bg-red-500 hover:bg-red-600 rounded-xl text-xs text-white font-semibold shadow-md transition-colors">마이크 끄기</button>
                </div>
            </div>

            <!-- 오른쪽: 타겟 언어 카드 -->
            <div class="glass-card rounded-3xl p-6 flex flex-col justify-between min-h-[320px] transition-all duration-300 hover:border-slate-500/30">
                <div>
                    <!-- 언어 선택 헤더 -->
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold tracking-wider text-cyan-400 uppercase">도착어 (Target)</span>
                        <select id="target-lang" class="bg-slate-800/90 text-sm font-medium border border-slate-700 rounded-xl px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-slate-200" onchange="handleLanguageChange()">
                            <option value="en-US">영어 (English)</option>
                            <option value="ko-KR">한국어 (Korean)</option>
                            <option value="ja-JP">일본어 (Japanese)</option>
                        </select>
                    </div>
                    
                    <!-- 결과 영역 -->
                    <div class="relative">
                        <textarea id="target-text" readonly placeholder="번역된 텍스트가 여기에 표시됩니다..." 
                            class="w-full h-40 bg-transparent text-lg text-slate-200 placeholder-slate-600 border-none resize-none focus:outline-none cursor-default"></textarea>
                        
                        <!-- 로딩 인디케이터 -->
                        <div id="translate-loader" class="absolute inset-0 bg-slate-900/40 backdrop-blur-xs flex justify-center items-center rounded-2xl hidden">
                            <div class="w-8 h-8 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </div>
                </div>

                <!-- 제어 및 액션 버튼 -->
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-800">
                    <div class="flex gap-2">
                        <button onclick="copyToClipboard('target-text')" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-100 transition-colors" title="텍스트 복사">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                    
                    <!-- 음성 듣기 버튼 (TTS) -->
                    <button id="speak-btn" onclick="speakText()" class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-cyan-600 hover:bg-cyan-500 text-white font-semibold transition-all duration-300 shadow-lg shadow-cyan-600/20 active:scale-95">
                        <i class="fa-solid fa-volume-high text-lg"></i>
                        <span>음성 듣기</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- 로컬 번역 추천 가이드 가이드보드 -->
        <div id="local-guide-box" class="glass-card rounded-2xl p-4 sm:p-5 hidden">
            <div class="flex items-center gap-2 mb-3">
                <i class="fa-solid fa-circle-info text-indigo-400"></i>
                <h3 class="text-sm font-bold text-slate-200">로컬 사전 번역 가이드 (인터넷 없이 즉시 작동)</h3>
            </div>
            <p class="text-xs text-slate-400 mb-4">현재 지정된 언어쌍으로 아래와 같은 실용 표현들을 음성으로 말씀하시면 즉시 고정 번역을 제공합니다. (기타 텍스트는 단어 단위 번역을 제공합니다.)</p>
            <div id="dictionary-chips" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto pr-1">
                <!-- 동적으로 생성될 키워드 칩들 -->
            </div>
        </div>

    </main>

    <!-- 커스텀 알림 토스트 메시지 -->
    <div id="toast" class="fixed bottom-6 right-6 px-5 py-3 rounded-2xl bg-slate-800 border border-slate-700 shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400 text-lg"></i>
        <span id="toast-message" class="text-sm text-slate-200">성공 메시지</span>
    </div>

    <!-- 하단 푸터 -->
    <footer class="max-w-4xl w-full mx-auto text-center mt-6 text-xs text-slate-500">
        <p>&copy; 2026 VoiceLink. Web Speech API 및 빌트인 번역 로직 작동 중.</p>
    </footer>

    <!-- 스크립트 기능 구현 -->
    <script>
        // --- 1. 상태 및 상수 정의 ---
        let currentEngine = 'ai'; // 'ai' (무료 무제한 온라인 실시간 번역)가 기본값
        let recognition = null;
        let isListening = false;

        // 로컬 오프라인 전용 다국어 사전 데이터베이스

                    '화장실은 어디인가요': 'お手洗いはどこですか (오테아라이와 도코데스카)',
                    '길을 잃었어요': '道に迷いました (미치니 마요이마시타)',

                    '배고파요': 'お腹が空きました (오나카가 수키마시타)'
                }
            },
            'en-US': {
                'ko-KR': {
                    'hello': '안녕하세요',
                    'nice to meet you': '반갑습니다',
                    'thank you': '감사합니다',
                    'sorry': '죄송합니다',
                    'help me': '도와주세요',
                    'how much is this': '이것은 얼마인가요?',
                    'where is the bathroom': '화장실은 어디인가요?',
                    'i am lost': '길을 잃었어요',
                    'delicious': '맛있어요',
                    'what is your name': '이름이 무엇인가요?',
                    'goodbye': '안녕히 가세요',
                    'water please': '물 주세요',
                    'i am hungry': '배고파요'
                },

                    'hello': 'こんにちは',
                    'nice to meet you': 'はじめまして',
                    'thank you': 'ありがとうございます',
                    'sorry': 'すみません',
                    'help me': '助けてください',
                    'how much is this': 'これはいくらですか',

                    'i am lost': '道に迷いました',
                    'delicious': '美味しいです',

                    'こんにちは': '안녕하세요',
                    'はじめまして': '반갑습니다',

                    'すみません': '죄송합니다',
                    '助けてください': '도와주세요',
                    'これはいくらですか': '이것은 얼마인가요?',
                    'お手洗いはどこですか': '화장실은 어디인가요?',
                    '道に迷いました': '길을 잃었어요',
                    '美味しいです': '맛있어요',
                    'お名前は何ですか': '이름이 무엇인가요?',
                    'さようなら': '안녕히 가세요',
                    'お水をください': '물 주세요',
                    'お腹が空きました': '배고파요'
                },
                'en-US': {
                    'こんにちは': 'Hello',
                    'はじめまして': 'Nice to meet you',
                    'ありがとうございます': 'Thank you',
                    'すみません': 'I am sorry',
                    '助けてください': 'Please help me',
                    'これはいくらですか': 'How much is this?',
                    'お手洗いはどこですか': 'Where is the restroom?',
                    '道に迷いました': 'I am lost',
                    '美味しいです': 'It is delicious',
                    'お名前は何ですか': 'What is your name?',
                    'さようなら': 'Goodbye',
                    'お水をください': 'Water, please',
                    'お腹が空きました': 'I am hungry'
                }
            }
        };

        // 로컬 단어 사전 (문장 매칭이 안되었을 때 폴백용 개별 단어 매칭)
        const wordDictionary = {
            '안녕': 'Hello', '나': 'I', '너': 'You', '물': 'Water', '밥': 'Rice/Food',
            '사랑': 'Love', '친구': 'Friend', '학교': 'School', '이것': 'This', '저것': 'That',
            '집': 'House', '길': 'Street', '돈': 'Money', '시간': 'Time', '오늘': 'Today'
        };

        // --- 2. 초기화 작업 ---
        window.addEventListener('DOMContentLoaded', () => {
            initSpeechRecognition();
            setEngine('ai'); // AI(온라인) 번역 우선 동작
            updateChips();
            
            const sourceTextarea = document.getElementById('source-text');
            let debounceTimer;

            // 입력 변화 감지 (타이핑 시 실시간 번역 연계)
            const handleInputEvent = () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    executeTranslation();
                }, 600);
            };

            sourceTextarea.addEventListener('input', handleInputEvent);
            // 한글 키보드 자모 결합이 끝났을 때 완성도를 높여 즉시 번역
            sourceTextarea.addEventListener('compositionend', handleInputEvent);
        });

        // 번역 엔진 토글 함수
        function setEngine(engine) {
            currentEngine = engine;
            const btnLocal = document.getElementById('engine-local');
            const btnAi = document.getElementById('engine-ai');
            
            if (engine === 'local') {
                btnLocal.className = "px-4 py-2 rounded-lg text-xs font-semibold transition-all duration-300 bg-indigo-600 text-white shadow-md";
                btnAi.className = "px-4 py-2 rounded-lg text-xs font-semibold transition-all duration-300 text-slate-400 hover:text-slate-200";
                document.getElementById('local-guide-box').classList.remove('hidden');
                showToast("로컬 사전 번역 모드로 전환되었습니다.", "info");
            } else {
                btnLocal.className = "px-4 py-2 rounded-lg text-xs font-semibold transition-all duration-300 text-slate-400 hover:text-slate-200";
                btnAi.className = "px-4 py-2 rounded-lg text-xs font-semibold transition-all duration-300 bg-indigo-600 text-white shadow-md";
                document.getElementById('local-guide-box').classList.add('hidden');
                showToast("온라인 초정밀 실시간 번역 모드가 활성화되었습니다.", "magic");
            }
            executeTranslation();
        }

        // --- 3. Web Speech API (STT / 음성 인식) 설정 ---
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.", "error");
                document.getElementById('mic-btn').disabled = true;
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true; // 대화가 끊겨도 마이크가 꺼지지 않도록 상시 유지
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('listening-wave').classList.remove('hidden');
            };

            recognition.onerror = (event) => {
                console.error("음성 인식 시스템 정보:", event.error);
                if (event.error === 'not-allowed') {
                    showToast("마이크 사용 권한 승인이 필요합니다.", "error");
                    stopSpeechRecognition();
                }
            };

            recognition.onend = () => {
                // 사용자가 임의로 마이크를 정지하지 않았다면 자동 재시작 루프 수행
                if (isListening) {
                    try {
                        recognition.start();
                    } catch (e) {
                        setTimeout(() => { if (isListening) recognition.start(); }, 300);
                    }
                }
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }

                if (finalTranscript.trim()) {
                    const textArea = document.getElementById('source-text');
                    const prevText = textArea.value.trim();
                    
                    // 기존에 있던 글자 뒤에 마이크 인식 결과를 자연스럽게 덧붙임
                    textArea.value = prevText ? prevText + " " + finalTranscript.trim() : finalTranscript.trim();
                    showToast("음성을 인식했습니다", "success");
                    executeTranslation();
                }
            };
        }

        function toggleSpeechRecognition() {
            if (!recognition) {
                initSpeechRecognition();
                if (!recognition) return;
            }

            if (isListening) {
                stopSpeechRecognition();
            } else {
                const sourceLang = document.getElementById('source-lang').value;
                recognition.lang = sourceLang;
                isListening = true;
                try {
                    recognition.start();
                    showToast("상시 마이크 작동 중... 원하실 때 말씀하세요.", "info");
                } catch (e) {
                    console.error("인식 시작 예외 발생:", e);
                }
            }
        }

        function stopSpeechRecognition() {
            isListening = false;
            if (recognition) {
                recognition.stop();
            }
            document.getElementById('listening-wave').classList.add('hidden');
            showToast("마이크 수신을 종료했습니다.", "info");
        }

        // --- 4. 번역 엔진 로직 ---
        async function executeTranslation() {
            const text = document.getElementById('source-text').value.trim();
            const targetTextarea = document.getElementById('target-text');
            
            if (!text) {
                targetTextarea.value = '';
                return;
            }

            const srcLang = document.getElementById('source-lang').value;
            const tgtLang = document.getElementById('target-lang').value;

            if (srcLang === tgtLang) {
                targetTextarea.value = text;
                return;
            }

            showLoader(true);

            if (currentEngine === 'local') {
                // 로컬 사전 번역 실행
                setTimeout(() => {
                    const result = translateLocally(text, srcLang, tgtLang);
                    targetTextarea.value = result;
                    showLoader(false);
                }, 150);
            } else {
                // 완전히 무료이고 안정적인 구글 오픈 번역 웹 API 연동 (API 키가 없어도 무조건 작동)
                try {
                    const result = await translateUsingOnlineAPI(text, srcLang, tgtLang);
                    targetTextarea.value = result;
                } catch (err) {
                    console.error("온라인 번역 연동 에러:", err);
                    showToast("온라인 번역 실패. 로컬 데이터로 임시 매칭합니다.", "error");
                    const fallback = translateLocally(text, srcLang, tgtLang);
                    targetTextarea.value = fallback;
                } finally {
                    showLoader(false);
                }
            }
        }

        // 키리스 무제한 무료 온라인 번역 API 연동 함수
        async function translateUsingOnlineAPI(text, src, tgt) {
            // 언어 포맷 분할 ('ko-KR' -> 'ko')
            const srcCode = src.split('-')[0];
            const tgtCode = tgt.split('-')[0];

            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcCode}&tl=${tgtCode}&dt=t&q=${encodeURIComponent(text)}`;

            const response = await fetch(url);
            if (!response.ok) {
                throw new Error("HTTP 요청 오류");
            }

            const data = await response.json();
            if (data && data[0]) {
                // 결합형 다중 문장 결과 병합 처리
                return data[0].map(item => item[0]).join('');
            }
            throw new Error("비정상적인 번역 패킷 응답");
        }

        // 로컬 오프라인 전용 단순 치환 보정
        function translateLocally(text, src, tgt) {
            const cleanText = text.toLowerCase().replace(/[?.,!]/g, '').trim();

            if (localDictionary[src] && localDictionary[src][tgt]) {
                const pairDict = localDictionary[src][tgt];
                
                if (pairDict[cleanText]) {
                    return pairDict[cleanText];
                }

                for (const key in pairDict) {
                    if (cleanText.includes(key.toLowerCase()) || key.toLowerCase().includes(cleanText)) {
                        return pairDict[key];
                    }
                }
            }

            const words = text.split(/\s+/);
            const translatedWords = words.map(w => {
                const cleanW = w.replace(/[?.,!]/g, '');
                if (wordDictionary[cleanW]) return wordDictionary[cleanW];
                
                for (const [k, v] of Object.entries(wordDictionary)) {
                    if (v.toLowerCase() === cleanW.toLowerCase()) return k;
                }
                return w; 
            });

            return translatedWords.join(' ');
        }

        // --- 5. Web Speech API (TTS / 음성 합성) 설정 ---
        function speakText() {
            const text = document.getElementById('target-text').value.trim();
            if (!text) {
                showToast("들려드릴 번역 텍스트가 없습니다.", "info");
                return;
            }

            const cleanText = text.replace(/\([^)]*\)/g, '').trim();
            const targetLang = document.getElementById('target-lang').value;
            
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = targetLang;

            const voices = window.speechSynthesis.getVoices();
            const matchingVoice = voices.find(v => v.lang.startsWith(targetLang.split('-')[0]));
            if (matchingVoice) {
                utterance.voice = matchingVoice;
            }

            utterance.onstart = () => {
                document.getElementById('speak-btn').classList.add('bg-cyan-700', 'scale-95');
            };

            utterance.onend = () => {
                document.getElementById('speak-btn').classList.remove('bg-cyan-700', 'scale-95');
            };

            utterance.onerror = (e) => {
                console.error("음성 재생 중 오류:", e);
                document.getElementById('speak-btn').classList.remove('bg-cyan-700', 'scale-95');
                showToast("음성 출력 장치 오류가 발생했습니다.", "error");
            };

            window.speechSynthesis.speak(utterance);
        }

        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {};
        }

        // --- 6. 기타 UI 상호작용 및 편의 기능 ---
        function handleLanguageChange() {
            const src = document.getElementById('source-lang');
            const tgt = document.getElementById('target-lang');
            
            if (src.value === tgt.value) {
                const options = Array.from(tgt.options).map(o => o.value);
                const nextLang = options.find(val => val !== src.value);
                tgt.value = nextLang;
            }

            updateChips();
            executeTranslation();
        }

        function updateChips() {
            const src = document.getElementById('source-lang').value;
            const tgt = document.getElementById('target-lang').value;
            const container = document.getElementById('dictionary-chips');
            container.innerHTML = '';

            if (localDictionary[src] && localDictionary[src][tgt]) {
                const list = Object.keys(localDictionary[src][tgt]);
                list.forEach(phrase => {
                    const chip = document.createElement('button');
                    chip.className = "px-3 py-1 bg-slate-800/80 hover:bg-slate-700 border border-slate-700 hover:border-slate-600 rounded-full text-xs text-slate-300 hover:text-white transition-all duration-200 active:scale-95";
                    chip.textContent = phrase;
                    chip.onclick = () => {
                        document.getElementById('source-text').value = phrase;
                        executeTranslation();
                    };
                    container.appendChild(chip);
                });
            } else {
                const hint = document.createElement('span');
                hint.className = "text-xs text-slate-500 italic";
                hint.textContent = "해당 언어쌍은 온라인 모드에서 무제한 자유 통번역됩니다.";
                container.appendChild(hint);
            }
        }

        function showLoader(visible) {
            const loader = document.getElementById('translate-loader');
            if (visible) {
                loader.classList.remove('hidden');
            } else {
                loader.classList.add('hidden');
            }
        }

        function clearText() {
            document.getElementById('source-text').value = '';
            document.getElementById('target-text').value = '';
        }

        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).value;
            if (!text) {
                showToast("복사할 내용이 없습니다.", "info");
                return;
            }

            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand('copy');
                showToast("텍스트가 클립보드에 복사되었습니다!", "success");
            } catch (err) {
                showToast("복사에 실패했습니다.", "error");
            }
            document.body.removeChild(tempInput);
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgSpan = document.getElementById('toast-message');

            msgSpan.textContent = message;

            if (type === 'success') {
                icon.className = "fa-solid fa-circle-check text-green-400 text-lg";
            } else if (type === 'error') {
                icon.className = "fa-solid fa-triangle-exclamation text-red-400 text-lg";
            } else if (type === 'info') {
                icon.className = "fa-solid fa-circle-info text-blue-400 text-lg";
            } else if (type === 'magic') {
                icon.className = "fa-solid fa-wand-magic-sparkles text-purple-400 text-lg";
            }

            toast.className = "fixed bottom-6 right-6 px-5 py-3 rounded-2xl bg-slate-800 border border-slate-700 shadow-2xl flex items-center gap-3 transform translate-y-0 opacity-100 transition-all duration-300 z-50";

            setTimeout(() => {
                toast.className = "fixed bottom-6 right-6 px-5 py-3 rounded-2xl bg-slate-800 border border-slate-700 shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none";
            }, 2500);
        }
    </script>
