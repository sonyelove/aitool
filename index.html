<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#ffffff;--card2:#f1f5f9;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.15);--text:#1e293b;--muted:#64748b;--dim:#94a3b8;--accent:#2563eb;--accent2:#6366f1;--amber:#d97706;--green:#059669;--red:#dc2626;--orange:#ea580c;--r:10px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px 24px;}
.wrap{max-width:1400px;margin:0 auto;}
.page-title{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--text);letter-spacing:1px;margin-bottom:4px;}
.meta{font-size:13px;color:var(--muted);margin-bottom:32px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:640px){.grid{grid-template-columns:1fr;}}
.card{border-radius:var(--r);padding:20px;text-decoration:none;color:#fff;display:flex;flex-direction:column;gap:8px;transition:.2s;min-height:140px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);pointer-events:none;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.18);}
.card-icon{font-size:26px;}
.card-title{font-size:15px;font-weight:700;}
.card-desc{font-size:12px;opacity:.85;line-height:1.6;flex:1;}
.card-fn{font-size:10px;opacity:.5;font-family:'Space Mono',monospace;margin-top:4px;}
.footer{margin-top:48px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);font-family:'Space Mono',monospace;}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-title">My Hub</div>
  <div class="meta">페이지 목록</div>
  <div class="grid">
    <a href="pdf_all_app.html" class="card" style="background:#2563eb;">
      <div class="card-icon">📄</div>
      <div class="card-title">PDF 올인원 도구 (분할, 병합, 압축, 편집)</div>
      <div class="card-fn">pdf_all_app.html</div>
    </a>
    <a href="voice_translator.html" class="card" style="background:#7c3aed;">
      <div class="card-icon">📊</div>
      <div class="card-title">스마트 음성 번역기 (로컬 &amp; AI 지원)</div>
      <div class="card-fn">voice_translator.html</div>
    </a>
  </div>
  <div class="footer">Generated by DataForge Link Builder &middot; dataforge.ai.kr</div>
</div>
</body>
</html>
